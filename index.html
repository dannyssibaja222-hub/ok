<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glitter Page</title>
  <style>
    body {
      background: #111;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
      color: #fff;
    }

    .search-box {
      width: 420px;
      background: #222;
      padding: 12px 18px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      box-shadow: 0 0 10px rgba(255, 105, 180, 0.4);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ccc;
      font-size: 16px;
    }

    .glitter-text {
      margin-top: 80px;
      font-size: 60px;
      font-weight: bold;
      text-transform: lowercase;
      background-image: linear-gradient(45deg, #ff8ad6, #ffc1ff, #ff8ad6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(255, 150, 220, 0.8);
    }
  </style>
</head>
<body>

  <div class="search-box">
    <input type="text" placeholder="search..." />
  </div>

  <div class="glitter-text">hey cutie pie</div>

</body>
</html>
